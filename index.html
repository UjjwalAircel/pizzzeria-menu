<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Pizzzeria Menu</title>

<style>

body{
margin:0;
background:#000;
font-family:sans-serif;
overflow:hidden;
}

.viewer{
position:relative;
width:100%;
max-width:650px;
height:100vh;
margin:auto;
overflow:hidden;
display:flex;
align-items:center;
}

.slider{
display:flex;
width:100%;
transition:transform .35s ease;
}

.slide{
min-width:100%;
display:flex;
justify-content:center;
align-items:center;
}

.slide img{
width:100%;
touch-action:none;
transform-origin:center;
transition:transform .25s ease;
}

.nav{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:36px;
color:white;
background:rgba(0,0,0,.4);
border:none;
padding:8px 12px;
}

.prev{left:0}
.next{right:0}

.page{
position:absolute;
bottom:14px;
left:50%;
transform:translateX(-50%);
color:white;
background:rgba(0,0,0,.5);
padding:5px 12px;
border-radius:20px;
font-size:14px;
}

</style>

</head>

<body>

<div class="viewer">

<button class="nav prev" onclick="prev()">❮</button>

<div class="slider" id="slider">

<div class="slide"><img src="images/menu1.jpg"></div>
<div class="slide"><img src="images/menu2.jpg"></div>
<div class="slide"><img src="images/menu3.jpg"></div>

</div>

<button class="nav next" onclick="next()">❯</button>

<div class="page" id="page">1 / 3</div>

</div>

<script>

/* slider */

const slider=document.getElementById("slider")
const page=document.getElementById("page")

let index=0
const total=slider.children.length

function update(){

slider.style.transform="translateX(-"+(index*100)+"%)"
page.innerText=(index+1)+" / "+total

}

function next(){

index++
if(index>=total) index=0
update()

}

function prev(){

index--
if(index<0) index=total-1
update()

}

/* zoom system */

document.querySelectorAll("img").forEach(img=>{

let scale=1
let lastTap=0
let startDist=0

let posX=0
let posY=0

let startX=0
let startY=0

function dist(a,b){

let dx=a.clientX-b.clientX
let dy=a.clientY-b.clientY

return Math.sqrt(dx*dx+dy*dy)

}

function apply(){

img.style.transform=
"translate("+posX+"px,"+posY+"px) scale("+scale+")"

}

img.addEventListener("touchstart",e=>{

if(e.touches.length==1){

startX=e.touches[0].clientX
startY=e.touches[0].clientY

}

if(e.touches.length==2){

startDist=dist(e.touches[0],e.touches[1])

}

})

img.addEventListener("touchmove",e=>{

/* pinch zoom */

if(e.touches.length==2){

let newDist=dist(e.touches[0],e.touches[1])

let zoomFactor=newDist/startDist

scale*=zoomFactor

if(scale<1) scale=1
if(scale>4) scale=4

startDist=newDist

apply()

}

/* drag image */

else if(e.touches.length==1 && scale>1){

let dx=e.touches[0].clientX-startX
let dy=e.touches[0].clientY-startY

posX+=dx
posY+=dy

startX=e.touches[0].clientX
startY=e.touches[0].clientY

apply()

}

})

img.addEventListener("touchend",e=>{

let now=Date.now()

/* double tap */

if(now-lastTap<300){

if(scale===1){

scale=2

}else{

scale=1
posX=0
posY=0

}

apply()

}

lastTap=now

})

})

/* swipe page change */

let startSwipeX=0

slider.addEventListener("touchstart",e=>{
startSwipeX=e.touches[0].clientX
})

slider.addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX

let activeImg=slider.children[index].querySelector("img")

/* zoom active হলে swipe disable */

let transform=activeImg.style.transform

if(transform.includes("scale(1)") || transform===""){

if(startSwipeX-endX>60) next()
if(endX-startSwipeX>60) prev()

}

})

</script>

</body>

</html>
