<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pizzzeria Menu</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:sans-serif;
}

.viewer{
position:relative;
width:100%;
max-width:650px;
height:100vh;
margin:auto;
overflow:hidden;
}

.slider{
display:flex;
height:100%;
transition:transform .3s ease;
}

.slide{
min-width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

.slide img{
max-width:100%;
max-height:100%;
touch-action:none;
transform-origin:center;
}

/* navigation */

.nav{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:32px;
color:white;
background:rgba(0,0,0,0.4);
border:none;
padding:8px 14px;
z-index:5;
}

.prev{left:5px}
.next{right:5px}

/* page indicator */

.page{
position:absolute;
bottom:12px;
left:50%;
transform:translateX(-50%);
color:white;
background:rgba(0,0,0,0.6);
padding:4px 14px;
border-radius:20px;
font-size:14px;
z-index:10;
}

</style>

</head>

<body>

<div class="viewer">

<button class="nav prev" onclick="prev()">❮</button>

<div class="slider" id="slider"></div>

<button class="nav next" onclick="next()">❯</button>

<div class="page" id="page"></div>

</div>

<script>

/* IMAGE LIST */

const images=[
"images/menu1.jpg",
"images/menu2.jpg",
"images/menu3.jpg"
]

const slider=document.getElementById("slider")

images.forEach(src=>{

let slide=document.createElement("div")
slide.className="slide"

let img=document.createElement("img")
img.src=src

slide.appendChild(img)
slider.appendChild(slide)

})

/* SLIDER */

const page=document.getElementById("page")

let index=0
const total=images.length

function update(){

slider.style.transform="translateX(-"+(index*100)+"%)"
page.innerText=(index+1)+" / "+total

}

function next(){

index++
if(index>=total) index=0
update()

}

function prev(){

index--
if(index<0) index=total-1
update()

}

update()

/* ZOOM */

document.querySelectorAll(".slide img").forEach(img=>{

let scale=1
let posX=0
let posY=0

let startX=0
let startY=0

let startDist=0
let lastTap=0

function distance(a,b){

let dx=a.clientX-b.clientX
let dy=a.clientY-b.clientY
return Math.sqrt(dx*dx+dy*dy)

}

function apply(){

img.style.transform=
"translate("+posX+"px,"+posY+"px) scale("+scale+")"

}

img.addEventListener("touchstart",e=>{

if(e.touches.length===1){

startX=e.touches[0].clientX
startY=e.touches[0].clientY

}

if(e.touches.length===2){

startDist=distance(e.touches[0],e.touches[1])

}

})

img.addEventListener("touchmove",e=>{

if(e.touches.length===2){

let newDist=distance(e.touches[0],e.touches[1])
let factor=newDist/startDist

scale*=factor

if(scale<1) scale=1
if(scale>4) scale=4

startDist=newDist

apply()

}

else if(e.touches.length===1 && scale>1){

let dx=e.touches[0].clientX-startX
let dy=e.touches[0].clientY-startY

posX+=dx
posY+=dy

startX=e.touches[0].clientX
startY=e.touches[0].clientY

apply()

}

})

img.addEventListener("touchend",()=>{

let now=Date.now()

if(now-lastTap<300){

if(scale===1){

scale=2

}else{

scale=1
posX=0
posY=0

}

apply()

}

lastTap=now

})

})

/* SWIPE */

let swipeStart=0

slider.addEventListener("touchstart",e=>{
swipeStart=e.touches[0].clientX
})

slider.addEventListener("touchend",e=>{

let swipeEnd=e.changedTouches[0].clientX

let activeImg=slider.children[index].querySelector("img")

if(activeImg.style.transform.includes("scale(1)") || activeImg.style.transform===""){

if(swipeStart-swipeEnd>60) next()
if(swipeEnd-swipeStart>60) prev()

}

})

</script>

</body>

</html>
